<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{admin/layout}">
<head>
    <title>反馈管理</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header" style="margin-bottom: 24px;">
            <h2 id="page-title" style="font-size: 20px; font-weight: 600; color: #333;">反馈管理</h2>
        </div>
        
        <div class="card">
            <div class="card-body">
                <div class="toolbar">
                    <div class="search-box">
                        <input type="text" class="search-input" id="searchKeyword" placeholder="反馈内容">
                        <select class="search-select" id="searchStatus">
                            <option value="">全部状态</option>
                            <option value="0">待处理</option>
                            <option value="1">已处理</option>
                            <option value="2">已驳回</option>
                        </select>
                        <select class="search-select" id="searchType">
                            <option value="">全部类型</option>
                            <option value="1">景点添加</option>
                            <option value="2">美食添加</option>
                            <option value="3">Bug反馈</option>
                            <option value="4">投诉</option>
                            <option value="5">功能建议</option>
                            <option value="6">其他</option>
                        </select>
                        <button class="btn btn-primary" onclick="loadData(1)">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/></svg>
                            搜索
                        </button>
                        <button class="btn btn-secondary" onclick="clearSearch()">清空</button>
                    </div>
                    <div class="action-btns">
                        <button class="btn btn-danger" onclick="batchDelete()">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg>
                            批量删除
                        </button>
                    </div>
                </div>
                
                <div class="table-wrapper">
                    <table class="data-table" id="dataTable">
                        <thead>
                            <tr>
                                <th width="50"><input type="checkbox" class="checkbox" id="selectAll" onchange="toggleSelectAll('dataTable', this)"></th>
                                <th>ID</th>
                                <th>用户</th>
                                <th>类型</th>
                                <th>内容</th>
                                <th>联系方式</th>
                                <th>状态</th>
                                <th>提交时间</th>
                                <th width="180">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td colspan="9" class="text-center">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div id="pagination" class="pagination"></div>
            </div>
        </div>
    </div>
    
    <script layout:fragment="scripts">
        async function loadData(page) {
            currentPage = page || 1;
            const keyword = document.getElementById('searchKeyword').value;
            const status = document.getElementById('searchStatus').value;
            const type = document.getElementById('searchType').value;
            
            let url = '/admin/feedback/list?pageNum=' + currentPage + '&pageSize=10';
            if (keyword) url += '&keyword=' + encodeURIComponent(keyword);
            if (status) url += '&status=' + status;
            if (type) url += '&type=' + type;
            
            showLoading();
            const result = await request(url);
            hideLoading();
            
            if (result && result.code === 200) {
                const tbody = document.getElementById('tableBody');
                if (result.data && result.data.records && result.data.records.length > 0) {
                    let html = '';
                    result.data.records.forEach(item => {
                        html += '<tr>';
                        html += '<td><input type="checkbox" class="checkbox row-checkbox" value="' + item.id + '" onchange="updateSelectAll()"></td>';
                        html += '<td>' + item.id + '</td>';
                        html += '<td>' + escapeHtml(item.user_name || '-') + '</td>';
                        html += '<td>' + getTypeText(item.type) + '</td>';
                        html += '<td class="text-ellipsis" title="' + escapeHtml(item.content || '') + '">' + escapeHtml(item.content || '-') + '</td>';
                        html += '<td>' + escapeHtml(item.contact || '-') + '</td>';
                        html += '<td>' + getStatusText(item.status) + '</td>';
                        html += '<td>' + formatDate(item.create_time) + '</td>';
                        html += '<td class="actions">';
                        html += '<button class="action-btn view" title="查看" onclick="viewDetail(' + item.id + ')"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M12,9A3,3 0 0,0 9,12A3,3 0 0,0 12,15A3,3 0 0,0 15,12A3,3 0 0,0 12,9M12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17M12,4.5C7,4.5 2.73,7.61 1,12C2.73,16.39 7,19.5 12,19.5C17,19.5 21.27,16.39 23,12C21.27,7.61 17,4.5 12,4.5Z"/></svg></button>';
                        if (item.status === 0) {
                            html += '<button class="btn btn-success btn-sm ml-2" onclick="openHandleModal(' + item.id + ', 1)">处理</button>';
                            html += '<button class="btn btn-warning btn-sm ml-2" onclick="openHandleModal(' + item.id + ', 2)">驳回</button>';
                        }
                        html += '<button class="action-btn delete" title="删除" onclick="deleteItem(' + item.id + ')"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg></button>';
                        html += '</td>';
                        html += '</tr>';
                    });
                    tbody.innerHTML = html;
                    renderPagination(document.getElementById('pagination'), currentPage, result.data.total, 10, 'loadData');
                } else {
                    tbody.innerHTML = '<tr><td colspan="9" class="text-center">暂无数据</td></tr>';
                    document.getElementById('pagination').innerHTML = '';
                }
            }
        }
        
        function getTypeText(type) {
            const types = { 1: '景点添加', 2: '美食添加', 3: 'Bug反馈', 4: '投诉', 5: '功能建议', 6: '其他' };
            return '<span class="status-tag info">' + (types[type] || '未知') + '</span>';
        }
        
        function getStatusText(status) {
            if (status === 0) return '<span class="status-tag warning">待处理</span>';
            if (status === 1) return '<span class="status-tag success">已处理</span>';
            if (status === 2) return '<span class="status-tag danger">已驳回</span>';
            return '-';
        }
        
        async function viewDetail(id) {
            showLoading();
            const result = await request('/admin/feedback/detail/' + id);
            hideLoading();
            
            if (!result || result.code !== 200) {
                showToast(result?.msg || '获取数据失败', 'error');
                return;
            }
            
            const data = result.data;
            const content = `
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">用户</label>
                        <div>${escapeHtml(data.user_name || '-')}</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">类型</label>
                        <div>${getTypeText(data.type)}</div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">反馈内容</label>
                    <div style="white-space: pre-wrap;">${escapeHtml(data.content || '-')}</div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">联系方式</label>
                        <div>${escapeHtml(data.contact || '-')}</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">状态</label>
                        <div>${getStatusText(data.status)}</div>
                    </div>
                </div>
                ${data.handle_result ? `
                <div class="form-group">
                    <label class="form-label">处理结果</label>
                    <div style="white-space: pre-wrap;">${escapeHtml(data.handle_result)}</div>
                </div>
                ` : ''}
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">提交时间</label>
                        <div>${formatDate(data.create_time)}</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">处理时间</label>
                        <div>${formatDate(data.handle_time)}</div>
                    </div>
                </div>
            `;
            
            openModal('反馈详情', content, '<button class="btn btn-secondary" onclick="closeModal()">关闭</button>');
        }
        
        function openHandleModal(id, status) {
            const title = status === 1 ? '处理反馈' : '驳回反馈';
            const content = `
                <input type="hidden" id="handleId" value="${id}">
                <input type="hidden" id="handleStatus" value="${status}">
                <div class="form-group">
                    <label class="form-label">处理结果</label>
                    <textarea class="form-control form-textarea" id="handleResult" placeholder="请输入处理结果"></textarea>
                </div>
            `;
            
            const footer = `
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="submitHandle()">确定</button>
            `;
            
            openModal(title, content, footer);
        }
        
        async function submitHandle() {
            const id = document.getElementById('handleId').value;
            const status = parseInt(document.getElementById('handleStatus').value);
            const handle_result = document.getElementById('handleResult').value.trim();
            
            showLoading();
            const result = await request('/admin/feedback/handle', {
                method: 'POST',
                body: JSON.stringify({ id, status, handle_result })
            });
            hideLoading();
            
            if (result && result.code === 200) {
                showToast(result.msg || '操作成功', 'success');
                closeModal();
                loadData(currentPage);
            } else {
                showToast(result?.msg || '操作失败', 'error');
            }
        }
        
        async function deleteItem(id) {
            if (!confirm('确定要删除该反馈吗？')) {
                return;
            }
            
            showLoading();
            const result = await request('/admin/feedback/delete', {
                method: 'POST',
                body: JSON.stringify({ id: id })
            });
            hideLoading();
            
            if (result && result.code === 200) {
                showToast('删除成功', 'success');
                loadData(currentPage);
            } else {
                showToast(result?.msg || '删除失败', 'error');
            }
        }
        
        async function batchDelete() {
            const ids = getSelectedIds('dataTable');
            if (ids.length === 0) {
                showToast('请选择要删除的数据', 'warning');
                return;
            }
            
            if (!confirm('确定要删除选中的 ' + ids.length + ' 条数据吗？')) {
                return;
            }
            
            showLoading();
            const result = await request('/admin/feedback/delete', {
                method: 'POST',
                body: JSON.stringify({ id: ids })
            });
            hideLoading();
            
            if (result && result.code === 200) {
                showToast('删除成功', 'success');
                loadData(currentPage);
            } else {
                showToast(result?.msg || '删除失败', 'error');
            }
        }
        
        function clearSearch() {
            document.getElementById('searchKeyword').value = '';
            document.getElementById('searchStatus').value = '';
            document.getElementById('searchType').value = '';
            loadData(1);
        }
        
        function updateSelectAll() {
            const table = document.getElementById('dataTable');
            const allCheckboxes = table.querySelectorAll('tbody .row-checkbox');
            const checkedCheckboxes = table.querySelectorAll('tbody .row-checkbox:checked');
            document.getElementById('selectAll').checked = allCheckboxes.length > 0 && allCheckboxes.length === checkedCheckboxes.length;
        }
        
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded, calling loadData...');
            loadData(1);
        });
    </script>
</body>
</html>
