<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{admin/layout}">
<head>
    <title>用户管理</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header" style="margin-bottom: 24px;">
            <h2 id="page-title" style="font-size: 20px; font-weight: 600; color: #333;">用户管理</h2>
        </div>
        
        <div class="card">
            <div class="card-body">
                <div class="toolbar">
                    <div class="search-box">
                        <input type="text" class="search-input" id="searchKeyword" placeholder="用户名/昵称/手机号">
                        <select class="search-select" id="searchGender">
                            <option value="">全部性别</option>
                            <option value="1">男</option>
                            <option value="2">女</option>
                            <option value="0">未知</option>
                        </select>
                        <select class="search-select" id="searchLoginType">
                            <option value="">全部登录方式</option>
                            <option value="1">微信登录</option>
                            <option value="2">账号登录</option>
                        </select>
                        <button class="btn btn-primary" onclick="loadData(1)">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/></svg>
                            搜索
                        </button>
                        <button class="btn btn-secondary" onclick="clearSearch()">清空</button>
                    </div>
                    <div class="action-btns">
                        <button class="btn btn-danger" onclick="batchDelete()">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg>
                            批量删除
                        </button>
                    </div>
                </div>
                
                <div class="table-wrapper">
                    <table class="data-table" id="dataTable">
                        <thead>
                            <tr>
                                <th width="50"><input type="checkbox" class="checkbox" id="selectAll" onchange="toggleSelectAll('dataTable', this)"></th>
                                <th>ID</th>
                                <th>头像</th>
                                <th>用户名</th>
                                <th>昵称</th>
                                <th>手机号</th>
                                <th>性别</th>
                                <th>年龄</th>
                                <th>登录方式</th>
                                <th>注册时间</th>
                                <th width="150">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td colspan="11" class="text-center">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div id="pagination" class="pagination"></div>
            </div>
        </div>
    </div>
    
    <script layout:fragment="scripts">
        async function loadData(page) {
            currentPage = page || 1;
            const keyword = document.getElementById('searchKeyword').value;
            const gender = document.getElementById('searchGender').value;
            const loginType = document.getElementById('searchLoginType').value;
            
            let url = '/admin/manage/user/list?pageNum=' + currentPage + '&pageSize=10';
            if (keyword) url += '&keyword=' + encodeURIComponent(keyword);
            if (gender) url += '&gender=' + gender;
            if (loginType) url += '&loginType=' + loginType;
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '<tr><td colspan="11" class="text-center">加载中...</td></tr>';
            
            try {
                const result = await request(url);
                
                if (!result) {
                    tbody.innerHTML = '<tr><td colspan="11" class="text-center" style="color: #999;">网络错误，请稍后重试</td></tr>';
                    document.getElementById('pagination').innerHTML = '';
                    return;
                }
                
                if (result.code === 200) {
                    if (result.data && result.data.records && result.data.records.length > 0) {
                        let html = '';
                        result.data.records.forEach(item => {
                            html += '<tr>';
                            html += '<td><input type="checkbox" class="checkbox row-checkbox" value="' + item.id + '" onchange="updateSelectAll()"></td>';
                            html += '<td>' + item.id + '</td>';
                            html += '<td><img src="' + (item.wx_avatar ? (item.wx_avatar.startsWith('http://') || item.wx_avatar.startsWith('https://') ? item.wx_avatar : item.wx_avatar) : '/api/admin/static/images/default-avatar.png') + '" onerror="this.src=\'/api/admin/static/images/default-avatar.png\'" class="image-preview"></td>';
                            html += '<td>' + escapeHtml(item.username || '-') + '</td>';
                            html += '<td>' + escapeHtml(item.nickname || item.wx_nickname || '-') + '</td>';
                            html += '<td>' + escapeHtml(item.phone || '-') + '</td>';
                            html += '<td>' + getGenderText(item.gender) + '</td>';
                            html += '<td>' + (item.age || '-') + '</td>';
                            html += '<td>' + getLoginTypeText(item.login_type) + '</td>';
                            html += '<td>' + formatDate(item.create_time) + '</td>';
                            html += '<td class="actions">';
                            html += '<button class="action-btn view" title="查看" onclick="viewDetail(' + item.id + ')"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M12,9A3,3 0 0,0 9,12A3,3 0 0,0 12,15A3,3 0 0,0 15,12A3,3 0 0,0 12,9M12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17M12,4.5C7,4.5 2.73,7.61 1,12C2.73,16.39 7,19.5 12,19.5C17,19.5 21.27,16.39 23,12C21.27,7.61 17,4.5 12,4.5Z"/></svg></button>';
                            html += '<button class="action-btn edit" title="编辑" onclick="openEditModal(' + item.id + ')"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M20.71,7.04C21.1,6.65 21.1,6 20.71,5.63L18.37,3.29C18,2.9 17.35,2.9 16.96,3.29L15.12,5.12L18.87,8.87M3,17.25V21H6.75L17.81,9.93L14.06,6.18L3,17.25Z"/></svg></button>';
                            html += '<button class="action-btn delete" title="删除" onclick="deleteItem(' + item.id + ')"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg></button>';
                            html += '</td>';
                            html += '</tr>';
                        });
                        tbody.innerHTML = html;
                        renderPagination(document.getElementById('pagination'), currentPage, result.data.total, 10, 'loadData');
                    } else {
                        tbody.innerHTML = '<tr><td colspan="11" class="text-center" style="color: #999;">暂无数据</td></tr>';
                        document.getElementById('pagination').innerHTML = '';
                    }
                } else {
                    console.error('API Error:', result);
                    tbody.innerHTML = '<tr><td colspan="11" class="text-center" style="color: #ef4444;">' + (result.msg || '加载失败') + '</td></tr>';
                    document.getElementById('pagination').innerHTML = '';
                }
            } catch (error) {
                console.error('Load data error:', error);
                tbody.innerHTML = '<tr><td colspan="11" class="text-center" style="color: #ef4444;">数据加载异常，请刷新重试</td></tr>';
                document.getElementById('pagination').innerHTML = '';
            }
        }
        
        function getGenderText(gender) {
            if (gender === 1) return '男';
            if (gender === 2) return '女';
            return '未知';
        }
        
        function getLoginTypeText(type) {
            if (type === 1) return '<span class="status-tag success">微信登录</span>';
            if (type === 2) return '<span class="status-tag info">账号登录</span>';
            return '-';
        }
        
        async function viewDetail(id) {
            showLoading();
            const result = await request('/admin/manage/user/detail/' + id);
            hideLoading();
            
            if (!result || result.code !== 200) {
                showToast(result?.msg || '获取数据失败', 'error');
                return;
            }
            
            const data = result.data;
            const content = `
                <div class="form-group">
                    <label class="form-label">用户ID</label>
                    <div>${data.id}</div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <div>${escapeHtml(data.username || '-')}</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">昵称</label>
                        <div>${escapeHtml(data.nickname || data.wx_nickname || '-')}</div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">手机号</label>
                        <div>${escapeHtml(data.phone || '-')}</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">性别</label>
                        <div>${getGenderText(data.gender)}</div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">年龄</label>
                        <div>${data.age || '-'}</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">登录方式</label>
                        <div>${data.login_type === 1 ? '微信登录' : '账号登录'}</div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">个人简介</label>
                    <div>${escapeHtml(data.intro || '-')}</div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">注册时间</label>
                        <div>${formatDate(data.create_time)}</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">更新时间</label>
                        <div>${formatDate(data.update_time)}</div>
                    </div>
                </div>
            `;
            
            openModal('用户详情', content, '<button class="btn btn-secondary" onclick="closeModal()">关闭</button>');
        }
        
        async function openEditModal(id) {
            showLoading();
            const result = await request('/admin/manage/user/detail/' + id);
            hideLoading();
            
            if (!result || result.code !== 200) {
                showToast(result?.msg || '获取数据失败', 'error');
                return;
            }
            
            const data = result.data;
            
            const content = `
                <input type="hidden" id="formId" value="${data.id}">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">昵称</label>
                        <input type="text" class="form-control" id="formNickname" value="${escapeHtml(data.nickname || '')}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">手机号</label>
                        <input type="text" class="form-control" id="formPhone" value="${escapeHtml(data.phone || '')}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">年龄</label>
                        <input type="number" class="form-control" id="formAge" value="${data.age || ''}" min="0" max="150">
                    </div>
                    <div class="form-group">
                        <label class="form-label">性别</label>
                        <select class="form-control form-select" id="formGender">
                            <option value="0" ${data.gender === 0 ? 'selected' : ''}>未知</option>
                            <option value="1" ${data.gender === 1 ? 'selected' : ''}>男</option>
                            <option value="2" ${data.gender === 2 ? 'selected' : ''}>女</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">个人简介</label>
                    <textarea class="form-control form-textarea" id="formIntro">${escapeHtml(data.intro || '')}</textarea>
                </div>
            `;
            
            const footer = `
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="submitUpdate()">确定</button>
            `;
            
            openModal('编辑用户', content, footer);
        }
        
        async function submitUpdate() {
            const id = document.getElementById('formId').value;
            const nickname = document.getElementById('formNickname').value.trim();
            const phone = document.getElementById('formPhone').value.trim();
            const age = document.getElementById('formAge').value;
            const gender = document.getElementById('formGender').value;
            const intro = document.getElementById('formIntro').value.trim();
            
            showLoading();
            const result = await request('/admin/manage/user/update', {
                method: 'POST',
                body: JSON.stringify({ id, nickname, phone, age: age ? parseInt(age) : null, gender: parseInt(gender), intro })
            });
            hideLoading();
            
            if (result && result.code === 200) {
                showToast('修改成功', 'success');
                closeModal();
                loadData(currentPage);
            } else {
                showToast(result?.msg || '修改失败', 'error');
            }
        }
        
        async function deleteItem(id) {
            if (!confirm('确定要删除该用户吗？')) {
                return;
            }
            
            showLoading();
            const result = await request('/admin/manage/user/delete', {
                method: 'POST',
                body: JSON.stringify({ id: id })
            });
            hideLoading();
            
            if (result && result.code === 200) {
                showToast('删除成功', 'success');
                loadData(currentPage);
            } else {
                showToast(result?.msg || '删除失败', 'error');
            }
        }
        
        async function batchDelete() {
            const ids = getSelectedIds('dataTable');
            if (ids.length === 0) {
                showToast('请选择要删除的数据', 'warning');
                return;
            }
            
            if (!confirm('确定要删除选中的 ' + ids.length + ' 条数据吗？')) {
                return;
            }
            
            showLoading();
            const result = await request('/admin/manage/user/delete', {
                method: 'POST',
                body: JSON.stringify({ id: ids })
            });
            hideLoading();
            
            if (result && result.code === 200) {
                showToast('删除成功', 'success');
                loadData(currentPage);
            } else {
                showToast(result?.msg || '删除失败', 'error');
            }
        }
        
        function clearSearch() {
            document.getElementById('searchKeyword').value = '';
            document.getElementById('searchGender').value = '';
            document.getElementById('searchLoginType').value = '';
            loadData(1);
        }
        
        function updateSelectAll() {
            const table = document.getElementById('dataTable');
            const allCheckboxes = table.querySelectorAll('tbody .row-checkbox');
            const checkedCheckboxes = table.querySelectorAll('tbody .row-checkbox:checked');
            document.getElementById('selectAll').checked = allCheckboxes.length > 0 && allCheckboxes.length === checkedCheckboxes.length;
        }
        
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded, calling loadData...');
            loadData(1);
        });
    </script>
</body>
</html>
