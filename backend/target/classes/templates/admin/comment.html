<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{admin/layout}">
<head>
    <title>评论管理</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header" style="margin-bottom: 24px;">
            <h2 id="page-title" style="font-size: 20px; font-weight: 600; color: #333;">评论管理</h2>
        </div>
        
        <div class="card">
            <div class="card-body">
                <div class="toolbar">
                    <div class="search-box">
                        <input type="text" class="search-input" id="searchKeyword" placeholder="评论内容">
                        <select class="search-select" id="searchStatus">
                            <option value="">全部状态</option>
                            <option value="1">待审核</option>
                            <option value="2">已通过</option>
                            <option value="3">已拒绝</option>
                        </select>
                        <select class="search-select" id="searchTargetType">
                            <option value="">全部类型</option>
                            <option value="1">景点评论</option>
                            <option value="2">美食评论</option>
                        </select>
                        <button class="btn btn-primary" onclick="loadData(1)">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/></svg>
                            搜索
                        </button>
                        <button class="btn btn-secondary" onclick="clearSearch()">清空</button>
                    </div>
                    <div class="action-btns">
                        <button class="btn btn-danger" onclick="batchDelete()">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg>
                            批量删除
                        </button>
                    </div>
                </div>
                
                <div class="table-wrapper">
                    <table class="data-table" id="dataTable">
                        <thead>
                            <tr>
                                <th width="50"><input type="checkbox" class="checkbox" id="selectAll" onchange="toggleSelectAll('dataTable', this)"></th>
                                <th>ID</th>
                                <th>用户</th>
                                <th>评论对象</th>
                                <th>评分</th>
                                <th>评论内容</th>
                                <th>状态</th>
                                <th>创建时间</th>
                                <th width="180">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td colspan="9" class="text-center">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div id="pagination" class="pagination"></div>
            </div>
        </div>
    </div>
    
    <script layout:fragment="scripts">
        async function loadData(page) {
            currentPage = page || 1;
            const keyword = document.getElementById('searchKeyword').value;
            const status = document.getElementById('searchStatus').value;
            const targetType = document.getElementById('searchTargetType').value;
            
            let url = '/admin/comment/list?pageNum=' + currentPage + '&pageSize=10';
            if (keyword) url += '&keyword=' + encodeURIComponent(keyword);
            if (status) url += '&status=' + status;
            if (targetType) url += '&targetType=' + targetType;
            
            showLoading();
            const result = await request(url);
            hideLoading();
            
            if (result && result.code === 200) {
                const tbody = document.getElementById('tableBody');
                if (result.data && result.data.records && result.data.records.length > 0) {
                    let html = '';
                    result.data.records.forEach(item => {
                        html += '<tr>';
                        html += '<td><input type="checkbox" class="checkbox row-checkbox" value="' + item.id + '" onchange="updateSelectAll()"></td>';
                        html += '<td>' + item.id + '</td>';
                        html += '<td>' + escapeHtml(item.user_name || '-') + '</td>';
                        html += '<td>' + (item.target_type === 1 ? '【景点】' : '【美食】') + escapeHtml(item.target_name || '-') + '</td>';
                        html += '<td>' + getScoreStars(item.score) + '</td>';
                        html += '<td class="text-ellipsis" title="' + escapeHtml(item.content || '') + '">' + escapeHtml(item.content || '-') + '</td>';
                        html += '<td>' + getStatusText(item.status) + '</td>';
                        html += '<td>' + formatDate(item.create_time) + '</td>';
                        html += '<td class="actions">';
                        if (item.status === 1) {
                            html += '<button class="btn btn-success btn-sm" onclick="auditComment(' + item.id + ', 2)">通过</button>';
                            html += '<button class="btn btn-warning btn-sm ml-2" onclick="auditComment(' + item.id + ', 3)">拒绝</button>';
                        }
                        html += '<button class="action-btn delete" title="删除" onclick="deleteItem(' + item.id + ')"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg></button>';
                        html += '</td>';
                        html += '</tr>';
                    });
                    tbody.innerHTML = html;
                    renderPagination(document.getElementById('pagination'), currentPage, result.data.total, 10, 'loadData');
                } else {
                    tbody.innerHTML = '<tr><td colspan="9" class="text-center">暂无数据</td></tr>';
                    document.getElementById('pagination').innerHTML = '';
                }
            }
        }
        
        function getScoreStars(score) {
            let stars = '';
            for (let i = 0; i < 5; i++) {
                if (i < score) {
                    stars += '★';
                } else {
                    stars += '☆';
                }
            }
            return '<span style="color: #f59e0b;">' + stars + '</span>';
        }
        
        function getStatusText(status) {
            if (status === 1) return '<span class="status-tag warning">待审核</span>';
            if (status === 2) return '<span class="status-tag success">已通过</span>';
            if (status === 3) return '<span class="status-tag danger">已拒绝</span>';
            return '-';
        }
        
        async function auditComment(id, status) {
            const action = status === 2 ? '通过' : '拒绝';
            if (!confirm('确定要' + action + '该评论吗？')) {
                return;
            }
            
            showLoading();
            const result = await request('/admin/comment/audit', {
                method: 'POST',
                body: JSON.stringify({ id, status })
            });
            hideLoading();
            
            if (result && result.code === 200) {
                showToast(result.msg || '操作成功', 'success');
                loadData(currentPage);
            } else {
                showToast(result?.msg || '操作失败', 'error');
            }
        }
        
        async function deleteItem(id) {
            if (!confirm('确定要删除该评论吗？')) {
                return;
            }
            
            showLoading();
            const result = await request('/admin/comment/delete', {
                method: 'POST',
                body: JSON.stringify({ id: id })
            });
            hideLoading();
            
            if (result && result.code === 200) {
                showToast('删除成功', 'success');
                loadData(currentPage);
            } else {
                showToast(result?.msg || '删除失败', 'error');
            }
        }
        
        async function batchDelete() {
            const ids = getSelectedIds('dataTable');
            if (ids.length === 0) {
                showToast('请选择要删除的数据', 'warning');
                return;
            }
            
            if (!confirm('确定要删除选中的 ' + ids.length + ' 条数据吗？')) {
                return;
            }
            
            showLoading();
            const result = await request('/admin/comment/delete', {
                method: 'POST',
                body: JSON.stringify({ id: ids })
            });
            hideLoading();
            
            if (result && result.code === 200) {
                showToast('删除成功', 'success');
                loadData(currentPage);
            } else {
                showToast(result?.msg || '删除失败', 'error');
            }
        }
        
        function clearSearch() {
            document.getElementById('searchKeyword').value = '';
            document.getElementById('searchStatus').value = '';
            document.getElementById('searchTargetType').value = '';
            loadData(1);
        }
        
        function updateSelectAll() {
            const table = document.getElementById('dataTable');
            const allCheckboxes = table.querySelectorAll('tbody .row-checkbox');
            const checkedCheckboxes = table.querySelectorAll('tbody .row-checkbox:checked');
            document.getElementById('selectAll').checked = allCheckboxes.length > 0 && allCheckboxes.length === checkedCheckboxes.length;
        }
        
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded, calling loadData...');
            loadData(1);
        });
    </script>
</body>
</html>
