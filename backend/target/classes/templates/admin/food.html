<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{admin/layout}">
<head>
    <title>美食管理</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header" style="margin-bottom: 24px;">
            <h2 id="page-title" style="font-size: 20px; font-weight: 600; color: #333;">美食管理</h2>
        </div>
        
        <div class="card">
            <div class="card-body">
                <div class="toolbar">
                    <div class="search-box">
                        <input type="text" class="search-input" id="searchKeyword" placeholder="美食名称/商户名/地址">
                        <select class="search-select" id="searchType">
                            <option value="">全部类型</option>
                            <option value="1">百色特色菜</option>
                            <option value="2">小吃</option>
                            <option value="3">茶饮</option>
                        </select>
                        <button class="btn btn-primary" onclick="loadData(1)">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/></svg>
                            搜索
                        </button>
                        <button class="btn btn-secondary" onclick="clearSearch()">清空</button>
                    </div>
                    <div class="action-btns">
                        <button class="btn btn-primary" onclick="openAddModal()">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></svg>
                            新增
                        </button>
                        <button class="btn btn-danger" onclick="batchDelete()">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg>
                            批量删除
                        </button>
                    </div>
                </div>
                
                <div class="table-wrapper">
                    <table class="data-table" id="dataTable">
                        <thead>
                            <tr>
                                <th width="50"><input type="checkbox" class="checkbox" id="selectAll" onchange="toggleSelectAll('dataTable', this)"></th>
                                <th>ID</th>
                                <th>封面</th>
                                <th>美食名称</th>
                                <th>商户名</th>
                                <th>类型</th>
                                <th>人均消费</th>
                                <th>评分</th>
                                <th>创建时间</th>
                                <th width="150">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td colspan="10" class="text-center">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div id="pagination" class="pagination"></div>
            </div>
        </div>
    </div>
    
    <script layout:fragment="scripts">
        async function loadData(page) {
            currentPage = page || 1;
            const keyword = document.getElementById('searchKeyword').value;
            const type = document.getElementById('searchType').value;
            
            let url = '/admin/food/list?pageNum=' + currentPage + '&pageSize=10';
            if (keyword) url += '&keyword=' + encodeURIComponent(keyword);
            if (type) url += '&type=' + type;
            
            showLoading();
            const result = await request(url);
            hideLoading();
            
            if (result && result.code === 200) {
                const tbody = document.getElementById('tableBody');
                if (result.data && result.data.records && result.data.records.length > 0) {
                    let html = '';
                    result.data.records.forEach(item => {
                        html += '<tr>';
                        html += '<td><input type="checkbox" class="checkbox row-checkbox" value="' + item.id + '" onchange="updateSelectAll()"></td>';
                        html += '<td>' + item.id + '</td>';
                        html += '<td><img src="' + (item.cover_img || '/api/admin/static/images/default-cover.png') + '" class="image-preview" onerror="this.src=\'/api/admin/static/images/default-cover.png\'"></td>';
                        html += '<td>' + escapeHtml(item.name_cn || '-') + '</td>';
                        html += '<td>' + escapeHtml(item.merchant_name_cn || '-') + '</td>';
                        html += '<td>' + getTypeText(item.type) + '</td>';
                        html += '<td>' + (item.per_capita_cn || '-') + '</td>';
                        html += '<td>' + (item.score_count > 0 ? (item.total_score / item.score_count).toFixed(1) : '-') + '</td>';
                        html += '<td>' + formatDate(item.create_time) + '</td>';
                        html += '<td class="actions">';
                        html += '<button class="action-btn view" title="查看" onclick="viewDetail(' + item.id + ')"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M12,9A3,3 0 0,0 9,12A3,3 0 0,0 12,15A3,3 0 0,0 15,12A3,3 0 0,0 12,9M12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17M12,4.5C7,4.5 2.73,7.61 1,12C2.73,16.39 7,19.5 12,19.5C17,19.5 21.27,16.39 23,12C21.27,7.61 17,4.5 12,4.5Z"/></svg></button>';
                        html += '<button class="action-btn edit" title="编辑" onclick="openEditModal(' + item.id + ')"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M20.71,7.04C21.1,6.65 21.1,6 20.71,5.63L18.37,3.29C18,2.9 17.35,2.9 16.96,3.29L15.12,5.12L18.87,8.87M3,17.25V21H6.75L17.81,9.93L14.06,6.18L3,17.25Z"/></svg></button>';
                        html += '<button class="action-btn delete" title="删除" onclick="deleteItem(' + item.id + ')"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg></button>';
                        html += '</td>';
                        html += '</tr>';
                    });
                    tbody.innerHTML = html;
                    renderPagination(document.getElementById('pagination'), currentPage, result.data.total, 10, 'loadData');
                } else {
                    tbody.innerHTML = '<tr><td colspan="10" class="text-center">暂无数据</td></tr>';
                    document.getElementById('pagination').innerHTML = '';
                }
            }
        }
        
        function getTypeText(type) {
            if (type === 1) return '<span class="status-tag danger">百色特色菜</span>';
            if (type === 2) return '<span class="status-tag warning">小吃</span>';
            if (type === 3) return '<span class="status-tag success">茶饮</span>';
            return '-';
        }
        
        async function viewDetail(id) {
            showLoading();
            const result = await request('/admin/food/detail/' + id);
            hideLoading();
            
            if (!result || result.code !== 200) {
                showToast(result?.msg || '获取数据失败', 'error');
                return;
            }
            
            const data = result.data;
            const content = `
                <div style="max-height: 60vh; overflow-y: auto;">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">美食名称</label>
                            <div>${escapeHtml(data.name_cn || '-')}</div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">商户名</label>
                            <div>${escapeHtml(data.merchant_name_cn || '-')}</div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">美食介绍</label>
                        <div style="white-space: pre-wrap;">${escapeHtml(data.desc_cn || '-')}</div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">类型</label>
                            <div>${getTypeText(data.type)}</div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">人均消费</label>
                            <div>${escapeHtml(data.per_capita_cn || '-')}</div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">招牌菜</label>
                        <div>${escapeHtml(data.signature_dish_cn || '-')}</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">地址</label>
                        <div>${escapeHtml(data.address_cn || '-')}</div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">营业时间</label>
                            <div>${escapeHtml(data.business_time_cn || '-')}</div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">联系电话</label>
                            <div>${escapeHtml(data.phone || '-')}</div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">评分</label>
                            <div>${data.score_count > 0 ? (data.total_score / data.score_count).toFixed(1) + ' 分 (' + data.score_count + '人评价)' : '暂无评分'}</div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">访问量</label>
                            <div>${data.visit_count || 0}</div>
                        </div>
                    </div>
                </div>
            `;
            
            openModal('美食详情', content, '<button class="btn btn-secondary" onclick="closeModal()">关闭</button>');
        }
        
        function openAddModal() {
            const content = `
                <div style="max-height: 60vh; overflow-y: auto;">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">美食名称 <span class="required">*</span></label>
                            <input type="text" class="form-control" id="formNameCn" placeholder="请输入美食名称">
                        </div>
                        <div class="form-group">
                            <label class="form-label">商户名 <span class="required">*</span></label>
                            <input type="text" class="form-control" id="formMerchantNameCn" placeholder="请输入商户名">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">美食介绍</label>
                        <textarea class="form-control form-textarea" id="formDescCn" placeholder="请输入美食介绍"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">类型 <span class="required">*</span></label>
                            <select class="form-control form-select" id="formType">
                                <option value="1">百色特色菜</option>
                                <option value="2">小吃</option>
                                <option value="3">茶饮</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">人均消费</label>
                            <input type="text" class="form-control" id="formPerCapitaCn" placeholder="如：50元/人">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">招牌菜</label>
                        <input type="text" class="form-control" id="formSignatureDishCn" placeholder="多个用逗号分隔">
                    </div>
                    <div class="form-group">
                        <label class="form-label">地址 <span class="required">*</span></label>
                        <input type="text" class="form-control" id="formAddressCn" placeholder="请输入详细地址">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">营业时间</label>
                            <input type="text" class="form-control" id="formBusinessTimeCn" placeholder="如：10:00-22:00">
                        </div>
                        <div class="form-group">
                            <label class="form-label">联系电话</label>
                            <input type="text" class="form-control" id="formPhone" placeholder="请输入联系电话">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">经度</label>
                            <input type="text" class="form-control" id="formLongitude" placeholder="如：106.618702">
                        </div>
                        <div class="form-group">
                            <label class="form-label">纬度</label>
                            <input type="text" class="form-control" id="formLatitude" placeholder="如：23.908333">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">封面图</label>
                        <div id="coverImgPreview"></div>
                        <input type="hidden" id="coverImgPreviewUrl">
                    </div>
                    <div class="form-group">
                        <label class="form-label">轮播图（可多选）</label>
                        <div id="imgsPreview"></div>
                        <input type="hidden" id="imgsPreviewUrl">
                    </div>
                </div>
            `;
            
            const footer = `
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="submitAdd()">确定</button>
            `;
            
            openModal('新增美食', content, footer).then(() => {
                createImageUploader('coverImgInput', 'coverImgPreview', false, 1);
                createImageUploader('imgsInput', 'imgsPreview', true, 3);
            });
        }
        
        async function openEditModal(id) {
            showLoading();
            const result = await request('/admin/food/detail/' + id);
            hideLoading();
            
            if (!result || result.code !== 200) {
                showToast(result?.msg || '获取数据失败', 'error');
                return;
            }
            
            const data = result.data;
            
            const content = `
                <input type="hidden" id="formId" value="${data.id}">
                <div style="max-height: 60vh; overflow-y: auto;">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">美食名称 <span class="required">*</span></label>
                            <input type="text" class="form-control" id="formNameCn" value="${escapeHtml(data.name_cn || '')}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">商户名 <span class="required">*</span></label>
                            <input type="text" class="form-control" id="formMerchantNameCn" value="${escapeHtml(data.merchant_name_cn || '')}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">美食介绍</label>
                        <textarea class="form-control form-textarea" id="formDescCn">${escapeHtml(data.desc_cn || '')}</textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">类型 <span class="required">*</span></label>
                            <select class="form-control form-select" id="formType">
                                <option value="1" ${data.type === 1 ? 'selected' : ''}>百色特色菜</option>
                                <option value="2" ${data.type === 2 ? 'selected' : ''}>小吃</option>
                                <option value="3" ${data.type === 3 ? 'selected' : ''}>茶饮</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">人均消费</label>
                            <input type="text" class="form-control" id="formPerCapitaCn" value="${escapeHtml(data.per_capita_cn || '')}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">招牌菜</label>
                        <input type="text" class="form-control" id="formSignatureDishCn" value="${escapeHtml(data.signature_dish_cn || '')}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">地址 <span class="required">*</span></label>
                        <input type="text" class="form-control" id="formAddressCn" value="${escapeHtml(data.address_cn || '')}">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">营业时间</label>
                            <input type="text" class="form-control" id="formBusinessTimeCn" value="${escapeHtml(data.business_time_cn || '')}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">联系电话</label>
                            <input type="text" class="form-control" id="formPhone" value="${escapeHtml(data.phone || '')}">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">经度</label>
                            <input type="text" class="form-control" id="formLongitude" value="${data.longitude || ''}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">纬度</label>
                            <input type="text" class="form-control" id="formLatitude" value="${data.latitude || ''}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">封面图</label>
                        <div id="coverImgPreviewEdit"></div>
                        <input type="hidden" id="coverImgPreviewEditUrl" value="${escapeHtml(data.cover_img || '')}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">轮播图（可多选）</label>
                        <div id="imgsPreviewEdit"></div>
                        <input type="hidden" id="imgsPreviewEditUrl" value="${escapeHtml(data.imgs || '')}">
                    </div>
                </div>
            `;
            
            const footer = `
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="submitUpdate()">确定</button>
            `;
            
            openModal('编辑美食', content, footer).then(() => {
                createImageUploader('coverImgInputEdit', 'coverImgPreviewEdit', false, 1);
                createImageUploader('imgsInputEdit', 'imgsPreviewEdit', true, 3);
                
                initImagePreview('coverImgPreviewEdit', data.cover_img, false, 1);
                initImagePreview('imgsPreviewEdit', data.imgs, true, 3);
            });
        }
        
        async function submitAdd() {
            const name_cn = document.getElementById('formNameCn').value.trim();
            const merchant_name_cn = document.getElementById('formMerchantNameCn').value.trim();
            const desc_cn = document.getElementById('formDescCn').value.trim();
            const type = parseInt(document.getElementById('formType').value);
            const per_capita_cn = document.getElementById('formPerCapitaCn').value.trim();
            const signature_dish_cn = document.getElementById('formSignatureDishCn').value.trim();
            const address_cn = document.getElementById('formAddressCn').value.trim();
            const business_time_cn = document.getElementById('formBusinessTimeCn').value.trim();
            const phone = document.getElementById('formPhone').value.trim();
            const longitude = document.getElementById('formLongitude').value.trim();
            const latitude = document.getElementById('formLatitude').value.trim();
            const cover_img = document.getElementById('coverImgPreviewUrl').value.trim();
            const imgs = document.getElementById('imgsPreviewUrl').value.trim();
            
            if (!name_cn) {
                showToast('请输入美食名称', 'error');
                return;
            }
            if (!merchant_name_cn) {
                showToast('请输入商户名', 'error');
                return;
            }
            if (!address_cn) {
                showToast('请输入地址', 'error');
                return;
            }
            
            const data = {
                name_cn, merchant_name_cn, desc_cn, type, per_capita_cn, signature_dish_cn, address_cn,
                business_time_cn, phone, cover_img, imgs,
                longitude: longitude || '0', latitude: latitude || '0',
                per_capita: per_capita_cn.replace(/[^0-9.]/g, '') || '0',
                type_cn: type === 1 ? '百色特色菜' : (type === 2 ? '小吃' : '茶饮'),
                type_en: type === 1 ? 'Baise Specialty' : (type === 2 ? 'Snacks' : 'Tea Drinks'),
                name_en: name_cn,
                merchant_name_en: merchant_name_cn,
                desc_en: desc_cn,
                signature_dish_en: signature_dish_cn,
                address_en: address_cn,
                business_time_en: business_time_cn,
                per_capita_en: per_capita_cn,
                service_type: 0,
                service_type_cn: '仅堂食',
                service_type_en: 'Dine-in Only'
            };
            
            showLoading();
            const result = await request('/admin/food/add', {
                method: 'POST',
                body: JSON.stringify(data)
            });
            hideLoading();
            
            if (result && result.code === 200) {
                showToast('添加成功', 'success');
                closeModal();
                loadData(1);
            } else {
                showToast(result?.msg || '添加失败', 'error');
            }
        }
        
        async function submitUpdate() {
            const id = document.getElementById('formId').value;
            const name_cn = document.getElementById('formNameCn').value.trim();
            const merchant_name_cn = document.getElementById('formMerchantNameCn').value.trim();
            const desc_cn = document.getElementById('formDescCn').value.trim();
            const type = parseInt(document.getElementById('formType').value);
            const per_capita_cn = document.getElementById('formPerCapitaCn').value.trim();
            const signature_dish_cn = document.getElementById('formSignatureDishCn').value.trim();
            const address_cn = document.getElementById('formAddressCn').value.trim();
            const business_time_cn = document.getElementById('formBusinessTimeCn').value.trim();
            const phone = document.getElementById('formPhone').value.trim();
            const longitude = document.getElementById('formLongitude').value.trim();
            const latitude = document.getElementById('formLatitude').value.trim();
            const cover_img = document.getElementById('coverImgPreviewEditUrl').value.trim();
            const imgs = document.getElementById('imgsPreviewEditUrl').value.trim();
            
            if (!name_cn) {
                showToast('请输入美食名称', 'error');
                return;
            }
            if (!merchant_name_cn) {
                showToast('请输入商户名', 'error');
                return;
            }
            if (!address_cn) {
                showToast('请输入地址', 'error');
                return;
            }
            
            const data = {
                id, name_cn, merchant_name_cn, desc_cn, type, per_capita_cn, signature_dish_cn, address_cn,
                business_time_cn, phone, cover_img, imgs,
                longitude: longitude || '0', latitude: latitude || '0',
                per_capita: per_capita_cn.replace(/[^0-9.]/g, '') || '0',
                type_cn: type === 1 ? '百色特色菜' : (type === 2 ? '小吃' : '茶饮'),
                type_en: type === 1 ? 'Baise Specialty' : (type === 2 ? 'Snacks' : 'Tea Drinks'),
                name_en: name_cn,
                merchant_name_en: merchant_name_cn,
                desc_en: desc_cn,
                signature_dish_en: signature_dish_cn,
                address_en: address_cn,
                business_time_en: business_time_cn,
                per_capita_en: per_capita_cn
            };
            
            showLoading();
            const result = await request('/admin/food/update', {
                method: 'POST',
                body: JSON.stringify(data)
            });
            hideLoading();
            
            if (result && result.code === 200) {
                showToast('修改成功', 'success');
                closeModal();
                loadData(currentPage);
            } else {
                showToast(result?.msg || '修改失败', 'error');
            }
        }
        
        async function deleteItem(id) {
            if (!confirm('确定要删除该美食吗？')) {
                return;
            }
            
            showLoading();
            const result = await request('/admin/food/delete', {
                method: 'POST',
                body: JSON.stringify({ id: id })
            });
            hideLoading();
            
            if (result && result.code === 200) {
                showToast('删除成功', 'success');
                loadData(currentPage);
            } else {
                showToast(result?.msg || '删除失败', 'error');
            }
        }
        
        async function batchDelete() {
            const ids = getSelectedIds('dataTable');
            if (ids.length === 0) {
                showToast('请选择要删除的数据', 'warning');
                return;
            }
            
            if (!confirm('确定要删除选中的 ' + ids.length + ' 条数据吗？')) {
                return;
            }
            
            showLoading();
            const result = await request('/admin/food/delete', {
                method: 'POST',
                body: JSON.stringify({ id: ids })
            });
            hideLoading();
            
            if (result && result.code === 200) {
                showToast('删除成功', 'success');
                loadData(currentPage);
            } else {
                showToast(result?.msg || '删除失败', 'error');
            }
        }
        
        function clearSearch() {
            document.getElementById('searchKeyword').value = '';
            document.getElementById('searchType').value = '';
            loadData(1);
        }
        
        function updateSelectAll() {
            const table = document.getElementById('dataTable');
            const allCheckboxes = table.querySelectorAll('tbody .row-checkbox');
            const checkedCheckboxes = table.querySelectorAll('tbody .row-checkbox:checked');
            document.getElementById('selectAll').checked = allCheckboxes.length > 0 && allCheckboxes.length === checkedCheckboxes.length;
        }
        
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded, calling loadData...');
            loadData(1);
        });
    </script>
</body>
</html>
