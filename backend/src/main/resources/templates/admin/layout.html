<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - 百色指南后台管理">百色指南后台管理</title>
    <link rel="stylesheet" th:href="@{/admin/static/css/main.css}">
    <link rel="stylesheet" th:href="@{/admin/static/css/common.css}">
</head>
<body>
    <div class="admin-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg viewBox="0 0 24 24" width="32" height="32">
                        <path fill="currentColor" d="M12,2L2,7L12,12L22,7L12,2M2,17L12,22L22,17V12L12,17L2,12V17Z"/>
                    </svg>
                </div>
                <span class="logo-text">百色指南平台</span>
            </div>
            <nav class="sidebar-nav">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="/api/admin/page/index" class="nav-link" th:classappend="${#httpServletRequest.requestURI.contains('/index') or #httpServletRequest.requestURI.equals('/api/admin/page/') or #httpServletRequest.requestURI.equals('/api/admin/page')} ? 'active' : ''">
                            <svg class="nav-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z"/></svg>
                            <span>首页</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/api/admin/page/admin" class="nav-link" th:classappend="${#httpServletRequest.requestURI.contains('/admin') and !#httpServletRequest.requestURI.contains('/admin/page/admin') ? '' : (#httpServletRequest.requestURI.contains('/admin/page/admin') ? 'active' : '')}">
                            <svg class="nav-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z"/></svg>
                            <span>管理员管理</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/api/admin/page/user" class="nav-link" th:classappend="${#httpServletRequest.requestURI.contains('/user')} ? 'active' : ''">
                            <svg class="nav-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M16 17V19H2V17S2 13 9 13 16 17 16 17M12.5 7.5A3.5 3.5 0 1 0 9 11A3.5 3.5 0 0 0 12.5 7.5M15.94 13A5.32 5.32 0 0 1 18 17V19H22V17S22 13.37 15.94 13M15 4A3.39 3.39 0 0 0 13.07 4.59A5 5 0 0 1 13.07 10.41A3.39 3.39 0 0 0 15 11A3.5 3.5 0 0 0 15 4Z"/></svg>
                            <span>用户管理</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/api/admin/page/scenic" class="nav-link" th:classappend="${#httpServletRequest.requestURI.contains('/scenic')} ? 'active' : ''">
                            <svg class="nav-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M14,6L10.25,11L13.1,14.8L11.5,16C9.81,13.75 7,10 7,10L1,18H23L14,6Z"/></svg>
                            <span>景点管理</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/api/admin/page/food" class="nav-link" th:classappend="${#httpServletRequest.requestURI.contains('/food')} ? 'active' : ''">
                            <svg class="nav-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M8.1,13.34L3.91,9.16C2.35,7.59 2.35,5.06 3.91,3.5L10.93,10.5L8.1,13.34M13.41,13L20.29,19.88L18.88,21.29L12,14.41L5.12,21.29L3.71,19.88L13.36,10.22L13.16,10C12.38,9.23 12.38,7.97 13.16,7.19L17.5,2.82L18.43,3.74L15.19,7L16.15,7.94L19.39,4.69L20.31,5.61L17.06,8.85L18,9.81L21.26,6.56L22.18,7.5L17.81,11.84C17.03,12.62 15.77,12.62 15,11.84L14.78,11.64L13.41,13Z"/></svg>
                            <span>美食管理</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/api/admin/page/comment" class="nav-link" th:classappend="${#httpServletRequest.requestURI.contains('/comment')} ? 'active' : ''">
                            <svg class="nav-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M9,22A1,1 0 0,1 8,21V18H4A2,2 0 0,1 2,16V4C2,2.89 2.9,2 4,2H20A2,2 0 0,1 22,4V16A2,2 0 0,1 20,18H13.9L10.2,21.71C10,21.9 9.75,22 9.5,22V22H9M10,16V19.08L13.08,16H20V4H4V16H10Z"/></svg>
                            <span>评论管理</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/api/admin/page/news" class="nav-link" th:classappend="${#httpServletRequest.requestURI.contains('/news')} ? 'active' : ''">
                            <svg class="nav-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M4,3H20A2,2 0 0,1 22,5V19A2,2 0 0,1 20,21H4A2,2 0 0,1 2,19V5A2,2 0 0,1 4,3M4,5V19H20V5H4M6,7H18V9H6V7M6,11H18V13H6V11M6,15H13V17H6V15Z"/></svg>
                            <span>资讯管理</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/api/admin/page/feedback" class="nav-link" th:classappend="${#httpServletRequest.requestURI.contains('/feedback')} ? 'active' : ''">
                            <svg class="nav-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M20,2H4A2,2 0 0,0 2,4V22L6,18H20A2,2 0 0,0 22,16V4A2,2 0 0,0 20,2M20,16H6L4,18V4H20V16Z"/></svg>
                            <span>反馈管理</span>
                        </a>
                    </li>
                    <li class="nav-item has-submenu">
                        <a href="javascript:;" class="nav-link" onclick="toggleSubmenu(this)">
                            <svg class="nav-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.5,5.32 14.87,5.07L14.5,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.5,2.42L9.13,5.07C8.5,5.32 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.94C7.96,18.34 8.5,18.68 9.13,18.93L9.5,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.5,21.58L14.87,18.93C15.5,18.67 16.04,18.34 16.56,17.94L19.05,18.95C19.27,19.03 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z"/></svg>
                            <span>系统管理</span>
                            <svg class="arrow-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M7.41,8.58L12,13.17L16.59,8.58L18,10L12,16L6,10L7.41,8.58Z"/></svg>
                        </a>
                        <ul class="submenu">
                            <li><a href="/api/admin/page/config" th:classappend="${#httpServletRequest.requestURI.contains('/config')} ? 'active' : ''">系统配置</a></li>
                            <li><a href="/api/admin/page/log" th:classappend="${#httpServletRequest.requestURI.contains('/log')} ? 'active' : ''">操作日志</a></li>
                        </ul>
                    </li>
                </ul>
            </nav>
        </aside>

        <div class="main-wrapper">
            <header class="header">
                <div class="header-left">
                    <button class="toggle-btn" onclick="toggleSidebar()">
                        <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M3,6H21V8H3V6M3,11H21V13H3V11M3,16H21V18H3V16Z"/></svg>
                    </button>
                    <nav class="breadcrumb">
                        <span>首页</span>
                        <span class="separator">/</span>
                        <span layout:replace="~{:: #page-title}">控制台</span>
                    </nav>
                </div>
                <div class="header-right">
                    <div class="user-dropdown">
                        <div class="user-info" onclick="toggleDropdown()">
                            <div class="avatar">
                                <svg viewBox="0 0 24 24" width="32" height="32"><path fill="currentColor" d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z"/></svg>
                            </div>
                            <span class="username" th:text="${admin?.nickname ?: admin?.username}">管理员</span>
                            <svg class="dropdown-arrow" viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M7.41,8.58L12,13.17L16.59,8.58L18,10L12,16L6,10L7.41,8.58Z"/></svg>
                        </div>
                        <div class="dropdown-menu" id="dropdownMenu">
                            <a href="/api/admin/page/profile" class="dropdown-item">
                                <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z"/></svg>
                                <span>个人信息</span>
                            </a>
                            <a href="javascript:;" class="dropdown-item" onclick="refreshPage()">
                                <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M17.65,6.35C16.2,4.9 14.21,4 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20C15.73,20 18.84,17.45 19.73,14H17.65C16.83,16.33 14.61,18 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6C13.66,6 15.14,6.69 16.22,7.78L13,11H20V4L17.65,6.35Z"/></svg>
                                <span>刷新页面</span>
                            </a>
                            <div class="dropdown-divider"></div>
                            <a href="javascript:;" class="dropdown-item logout" onclick="logout()">
                                <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M16,17V14H9V10H16V7L21,12L16,17M14,2A2,2 0 0,1 16,4V6H14V4H5V20H14V18H16V20A2,2 0 0,1 14,22H5A2,2 0 0,1 3,20V4A2,2 0 0,1 5,2H14Z"/></svg>
                                <span>退出登录</span>
                            </a>
                        </div>
                    </div>
                </div>
            </header>

            <main class="main-content">
                <div layout:fragment="content">
                    <p>页面内容</p>
                </div>
            </main>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title"></h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body"></div>
            <div class="modal-footer"></div>
        </div>
    </div>
    <div id="loading" class="loading-overlay" style="display: none;">
        <div class="loading-spinner"></div>
    </div>

    <script th:src="@{/admin/static/js/common.js}"></script>
    <script layout:fragment="scripts"></script>
</body>
</html>
